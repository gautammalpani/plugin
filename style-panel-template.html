<div data-ng-controller="plugin-filterBar.controllers.stylerController">
  <div class="style-control"><label>Widget Mode</label>
    <select data-ng-model="widget.style.widgetMode"><option value="single">Single Filter (1 field)</option><option value="multi">Multi Filter Bar (multiple fields)</option></select>
  </div>
  <div class="style-control"><label>Selection Mode (list mode)</label>
    <select data-ng-model="widget.style.selectionMode"><option value="single">Single-select</option><option value="multi">Multi-select</option></select>
  </div>
  <div class="style-control"><label>Numeric Mode</label>
    <select data-ng-model="widget.style.numericMode"><option value="auto">Auto</option><option value="list">List</option><option value="range">Range (min/max)</option></select>
  </div>
  <div class="style-control"><label>Date Mode</label>
    <select data-ng-model="widget.style.dateMode"><option value="auto">Auto</option><option value="list">List (by level)</option><option value="range">Date Range (From/To)</option></select>
  </div>
  <div class="style-control"><label>Date Level (when Date Mode = List)</label>
    <select data-ng-model="widget.style.dateLevel"><option value="days">Days</option><option value="weeks">Weeks</option><option value="months">Months</option><option value="quarters">Quarters</option><option value="years">Years</option></select>
  </div>
  <hr/>
  <div class="style-control"><label>Enable Search / Typeahead</label>
    <input type="checkbox" data-ng-model="widget.style.enableTypeahead"/>
  </div>
  <div class="style-control"><label>Server-side Typeahead</label>
    <select data-ng-model="widget.style.serverTypeaheadMode"><option value="auto">Auto</option><option value="on">On</option><option value="off">Off</option></select>
  </div>
  <div class="style-control"><label>Text match mode (server typeahead)</label>
    <select data-ng-model="widget.style.textMatchMode"><option value="auto">Auto (Starts-with for large)</option><option value="startsWith">Starts With</option><option value="contains">Contains</option></select>
  </div>
  <div class="style-control"><label>Auto: treat list as large when it hits max results</label>
    <input type="checkbox" data-ng-model="widget.style.autoLargeWhenTruncated"/>
  </div>
  <div class="style-control"><label>Min chars to trigger typeahead</label>
    <input type="number" min="1" max="10" data-ng-model="widget.style.minChars"/>
  </div>
  <div class="style-control"><label>Max results</label>
    <input type="number" min="10" max="5000" data-ng-model="widget.style.maxResults"/>
  </div>
  <div class="style-control"><label>Multi mode: Query all fields for initial values</label>
    <input type="checkbox" data-ng-model="widget.style.queryAllFieldsInMultiMode"/>
  </div>
  <hr/>
  <div class="style-control"><label>Persist Filter (save to server)</label>
    <input type="checkbox" data-ng-model="widget.style.saveToServer"/>
  </div>
  <div class="style-control"><label>Apply Behavior</label>
    <select data-ng-model="widget.style.applyBehavior"><option value="auto">Auto-apply</option><option value="button">Apply button</option></select>
  </div>
</div>
